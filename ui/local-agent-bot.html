<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NeO</title>
  <link rel="icon" href="/ui/perpy.svg?v=neo" type="image/svg+xml" />
  <link rel="stylesheet" href="/ui/local-agent-bot.css" />
</head>
<body class="pex-root">
  <div class="pex-app">
    <header class="pex-topbar">
      <div class="pex-brand">
        <img class="pex-brand-icon" src="/ui/perpy.svg?v=neo" width="40" height="40" alt="" />
        <div class="pex-brand-text">
          <h1 class="pex-brand-name">NeO</h1>
          <p class="pex-brand-sub">OllanVin Virtual Agent</p>
        </div>
      </div>
      <button type="button" class="pex-panel-toggle" id="btn-system-panel" aria-expanded="false" aria-controls="system-drawer" title="작업·엔진 상태">
        <span class="pex-panel-toggle-icon" aria-hidden="true"></span>
        <span class="pex-sr-only">시스템 패널</span>
      </button>
    </header>

    <p class="pex-intro" id="pex-intro">말로 명령하세요. 빌드 큐, 작업 목록, 실패 분석을 처리합니다.</p>

    <div class="pex-messages-wrap" id="messages-wrap">
      <div id="messages" class="pex-messages" aria-live="polite"></div>
    </div>

    <footer class="pex-composer-bar">
      <form id="chat-form" class="pex-composer" autocomplete="off">
        <label class="pex-sr-only" for="chat-input">메시지</label>
        <textarea
          id="chat-input"
          class="pex-composer-input"
          rows="1"
          placeholder="예: 마이폰첵 빌드 돌려"
          spellcheck="false"
        ></textarea>
        <button type="submit" class="pex-composer-send" aria-label="전송">
          <svg class="pex-send-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <div id="drawer-backdrop" class="pex-backdrop" hidden aria-hidden="true"></div>
  <aside id="system-drawer" class="pex-drawer" aria-label="시스템 패널" hidden>
    <div class="pex-drawer-head">
      <h2 class="pex-drawer-title">상태</h2>
      <button type="button" class="pex-drawer-close" id="btn-drawer-close" aria-label="닫기">×</button>
    </div>
    <div class="pex-drawer-body">
      <section class="pex-drawer-section">
        <div class="pex-drawer-section-head">
          <h3>최근 작업</h3>
          <button type="button" class="pex-ghost-btn" id="btn-refresh-tasks">새로고침</button>
        </div>
        <div id="task-list" class="pex-task-list" role="list"></div>
      </section>
      <section class="pex-drawer-section">
        <div class="pex-drawer-section-head">
          <h3>마지막 실패 프롬프트</h3>
          <button type="button" class="pex-ghost-btn" id="btn-load-prompt">불러오기</button>
        </div>
        <pre id="prompt-card" class="pex-prompt-body">(없음)</pre>
      </section>
      <section class="pex-drawer-section">
        <h3>현재 작업</h3>
        <div id="current-task-detail" class="pex-current-body">
          <p class="pex-current-empty">RUN_PENDING / RUNNING 없음</p>
        </div>
      </section>
    </div>
  </aside>

  <script src="/ui/local-agent-bot.js"></script>
</body>
</html>
